<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safety ALM — Login</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--color-bg); }
    .auth-card { background: var(--color-surface); border-radius: 8px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 { font-size: 22px; font-weight: 700; color: var(--color-primary); letter-spacing: -0.5px; }
    .auth-logo p { font-size: 13px; color: var(--color-text-muted); margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 12px; border: 2px solid var(--color-border); border-radius: 4px; font-size: 14px; color: var(--color-text); background: var(--color-surface); transition: border-color 0.15s; }
    .form-group input:focus { outline: none; border-color: var(--color-primary); }
    .btn-primary { width: 100%; padding: 11px; background: var(--color-primary); color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
    .btn-primary:hover { background: var(--color-primary-dark); }
    .btn-primary:disabled { background: var(--color-border); color: var(--color-text-muted); cursor: not-allowed; }
    .auth-error { color: var(--color-error); font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }
    .auth-divider { border: none; border-top: 1px solid var(--color-border); margin: 24px 0; }
    .auth-footer { text-align: center; font-size: 12px; color: var(--color-text-muted); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Safety ALM</h1>
      <p>ALM/PLM &amp; Functional Safety Platform</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="user@company.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Sign In</button>
      <p class="auth-error" id="auth-error"></p>
    </form>
    <hr class="auth-divider"/>
    <p class="auth-footer">Safety ALM v1.0 — ISO 26262 · ARP4761 · DO-254 · MIL-STD-882</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mzlwwdspryhbsttwunva.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_BCKT9piD8JelFqA8VZPGYw_LG5IRlyy';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'app.html';
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errorEl = document.getElementById('auth-error');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = 'Invalid email or password.';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = 'app.html';
      }
    });
  </script>
</body>
</html>
